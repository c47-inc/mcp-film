name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  issues: write
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Build site
        run: node build.mjs
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
      - name: Ping IndexNow
        if: success()
        continue-on-error: true
        run: |
          curl -fsS -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d '{
              "host": "mcp.film",
              "key": "c5a7c1c2002f38ba129f0f3d6fc99c73",
              "keyLocation": "https://mcp.film/c5a7c1c2002f38ba129f0f3d6fc99c73.txt",
              "urlList": [
                "https://mcp.film/",
                "https://mcp.film/stack/",
                "https://mcp.film/for-agents/",
                "https://mcp.film/sitemap.xml"
              ]
            }' || true
      - name: Alert on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          existing=$(gh issue list --repo "$GITHUB_REPOSITORY" --label automation-failure --state open --search "${{ github.workflow }}" --json number -q '.[0].number' || true)
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "$GITHUB_REPOSITORY" --body "Failed again: $url"
          else
            gh issue create --repo "$GITHUB_REPOSITORY" \
              --title "Automation failure: ${{ github.workflow }}" \
              --label automation-failure \
              --body "A scheduled/triggered run failed: $url

          Likely causes: expired or unfunded ANTHROPIC_API_KEY, a revoked POSTHOG_API_KEY, a deprecated model ID, or an upstream action change. The site keeps serving either way — only self-updating is paused until this is fixed." \
            || gh issue create --repo "$GITHUB_REPOSITORY" --title "Automation failure: ${{ github.workflow }}" --body "Run failed: $url"
          fi
